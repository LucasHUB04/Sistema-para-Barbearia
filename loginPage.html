<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="body-login">

  <form class="login-page" id="login-form" method="POST" action="/login-page">

    <div class="login-header">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="BarberFlow">
        <div class="header-text">
            <h2 id="login-titulo">Bem-vindo de volta</h2>
            <p id="login-subtitulo">Acesse sua conta para continuar</p>
        </div>
    </div>

    <div class="tipo-usuario">
        <p>Entrar como:</p>
        <div class="opcoes-radio opcoes-3">
            <input type="radio" id="cliente" name="tipo_login" value="cliente" checked>
            <input type="radio" id="barbeiro" name="tipo_login" value="barbeiro">
            <input type="radio" id="admin" name="tipo_login" value="admin">
            <div class="slider"></div>
            <label for="cliente">Cliente</label>
            <label for="barbeiro">Barbearia</label>
            <label for="admin">Admin</label>
        </div>
    </div>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="seu@email.com" required>

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" placeholder="••••••••" required>

    <button type="submit" id="entrar">Entrar</button>

    <div class="links">
        <a href="#">Esqueci minha senha</a>
        <a href="/cadastro">Criar conta</a>
    </div>

  </form>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
